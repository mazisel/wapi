services:

  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: wapi
      POSTGRES_USER: wapi
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - wapi_internal
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U wapi -d wapi"]
      interval: 10s
      timeout: 5s
      retries: 5
    # Postgres portu dışarıya açılmıyor — sadece iç ağ

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    networks:
      - wapi_internal
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "${API_PORT:-3000}:3000"
    networks:
      - wapi_internal
    environment:
      NODE_ENV: production
      PORT: 3000
      HOST: 0.0.0.0
      DATABASE_URL: postgresql://wapi:${POSTGRES_PASSWORD}@postgres:5432/wapi
      REDIS_URL: redis://redis:6379
      SESSION_BASE_DIR: /app/data/sessions
      MASTER_API_KEY: ${MASTER_API_KEY}
      LOG_LEVEL: ${LOG_LEVEL:-info}
      HOURLY_MSG_LIMIT: ${HOURLY_MSG_LIMIT:-60}
      DAILY_MSG_LIMIT: ${DAILY_MSG_LIMIT:-500}
      MIN_MSG_GAP_MS: ${MIN_MSG_GAP_MS:-3000}
    volumes:
      - app_sessions:/app/data/sessions
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/health"]
      interval: 30s
      timeout: 10s
      start_period: 15s
      retries: 3
    labels:
      - "wapi.service=api"

  admin:
    build:
      context: .
      dockerfile: apps/admin/Dockerfile
    restart: unless-stopped
    depends_on:
      api:
        condition: service_healthy
    ports:
      - "${ADMIN_PORT:-3001}:3001"
    networks:
      - wapi_internal
    environment:
      NODE_ENV: production
      PORT: 3001
      API_URL: http://api:3000
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3001/"]
      interval: 30s
      timeout: 10s
      start_period: 20s
      retries: 3
    labels:
      - "wapi.service=admin"

networks:
  wapi_internal:
    driver: bridge

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  app_sessions:
    driver: local
